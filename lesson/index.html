<!DOCTYPE html>
<html lang="en">
    <head>

        <link rel="stylesheet" href="../css/general.css">

        <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css"> -->
         <link rel="stylesheet" href="../css/prism.css">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
</head>
<body>
    <header>
        <nav class="container">
        <a href="../" class="logo">Oncorplat</a>
        <button class="burger" aria-label="Menu">
            <i class="fa-solid fa-bars"></i>
        </button>
        <ul class="nav-links">
            <li><a href="../about/">About</a></li>
            <li><a href="../catalog/">Courses</a></li>
            <li><a href="../account/">Dashboard</a></li>
        </ul>
        </nav>
        <div class="sidebar-overlay"></div>
        <aside class="sidebar">
            <ul>
                <li><a href="../about/">About</a></li>
                <li><a href="../catalog/">Courses</a></li>
                <li><a href="../account/">Dashboard</a></li>
            </ul>
            <div class="sidebar-footer">
                <a href="https://github.com/vatislo" target="_blank">Developer</a>
                <a href="https://github.com/vatislo/Oncourplat" target="_blank">Repository</a>
                <p>Educational project</p>
            </div>
        </aside>
    </header>
    <main>
        <section class="course-box">
            <div class="container course">
                <div class="left-menu">
                    <div id="info" class="info">
                    </div>
                    <ul id="lesson-list" class="lesson-list">
                    </ul>
                </div>
                <div id="work" class="work">
                </div>
            </div>
        </section>
    </main>
    <footer>
        <div class="container">
            <p>Educational project by <a href="https://github.com/Vatislo" target="_blank">vatislo</a></p>
        </div>
    </footer>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('code').forEach((codeElement) => {
                codeElement.classList.add('language-javascript');
            });
            Prism.highlightAllUnder(document.body);
        });
    </script>
    <script src="../main.js"></script>
    <script src="./script.js"></script>
    <script src="https://kit.fontawesome.com/aa803d7ef1.js" crossorigin="anonymous"></script>

</html>
