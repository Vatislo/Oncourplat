    <link rel="stylesheet" href="../css/general.css">

<body>
    <header>
        <nav class="container">
        <a href="../index.html" class="logo">Oncorplat</a>
        <ul class="nav-links">
            <li><a href="../about/index.html">About</a></li>
            <li><a href="../catalog/index.html">Courses</a></li>
            <li><a href="../account/index.html">Dashboard</a></li>

    <main>

        <section class="catalog-text-box">
            <div class="container catalog-text">
                <h1>
                    Courses Catalog
                </h1>
                <p>
                    Choose your path and start learning
                </p>
                <form class="catalog-form">
                    <select name="" id="selProLang">
                        <option value="" hidden="" selected="">Programm languge</option>
                        <option value="">Any</option>
                        <option value="JavaScript">JavaScript</option>
                        <option value="Python">Python</option>
                        <option value="Java">Java</option>
                        <option value="Rust">Rust</option>
                        <option value="PHP">PHP</option>
                    </select>
                    <select name="" id="selLevel">
                        <option value="" hidden="" selected="">Start level</option>
                        <option value="">Any</option>
                        <option value="junior">Junior</option>
                        <option value="middle">Middle</option>
                        <option value="senior">Senior</option>
                    </select>
                    <button type="submit">Search</button>
                </form>
            </div>
        </section>
        <section class="catalog-card-box">
            <div class="container cards catalog-card ">
                
            </div>
        </section>
    </main>
    <footer>
        <div class="container">
            <p>Educational project by <a href="https://github.com/Vatislo" target="_blank">vatislo</a></p>
